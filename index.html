<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OM Builder</title>
<style>
  :root {
    --accent: #1B4D3E;
    --bg: #FAFAF8;
    --ink: #1A1A18;
    --ink-soft: #6B6B66;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    text-align: center;
    max-width: 360px;
    padding: 32px;
  }
  .logo {
    height: 32px;
    margin-bottom: 8px;
  }
  .brand-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 28px;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #DEDDD6;
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 18px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .message {
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .submessage {
    font-size: 12.5px;
    color: var(--ink-soft);
  }
  /* Hidden until JS decides this is actually a cold start */
  #loading { display: none; }
</style>
</head>
<body>
  <div class="box">
    <div id="loading">
      <img class="logo" src="logo.png" alt="Sevenstone" onerror="this.style.display='none'">
      <div class="brand-label">OM BUILDER</div>
      <div class="spinner"></div>
      <div class="message">Waking up the OM Builder&hellip;</div>
      <div class="submessage">This only takes a moment after a period of inactivity.</div>
    </div>
  </div>

<script>
(function () {
  // The real app's URL. Update this if the Render service URL ever changes.
  var APP_URL = 'https://om-builder-sevenstone.onrender.com';

  // Carry forward any path/query the visitor used, so a bookmarked deep
  // link (e.g. ?id=...) still lands in the right place after redirect.
  var target = APP_URL + window.location.pathname + window.location.search + window.location.hash;

  var loadingEl = document.getElementById('loading');
  var coldStartShown = false;
  var FAST_TIMEOUT_MS = 1500;   // if no response within this, assume cold start and show the loading screen
  var RETRY_INTERVAL_MS = 2500; // how often to re-check while waiting for wake-up

  function showLoadingScreen() {
    if (!coldStartShown) {
      coldStartShown = true;
      loadingEl.style.display = 'block';
    }
  }

  function redirectNow() {
    window.location.replace(target);
  }

  function ping(onSuccess, onTimeoutOrFail) {
    var controller = new AbortController();
    var timedOut = false;
    var timer = setTimeout(function () {
      timedOut = true;
      controller.abort();
    }, FAST_TIMEOUT_MS);

    fetch(APP_URL + '/healthz', { signal: controller.signal, cache: 'no-store' })
      .then(function (res) {
        clearTimeout(timer);
        if (res.ok) {
          onSuccess();
        } else {
          onTimeoutOrFail();
        }
      })
      .catch(function () {
        clearTimeout(timer);
        onTimeoutOrFail();
      });
  }

  function pollUntilWarm() {
    ping(redirectNow, function () {
      showLoadingScreen();
      setTimeout(pollUntilWarm, RETRY_INTERVAL_MS);
    });
  }

  // First attempt: quick check. If it's already warm, this resolves well
  // within FAST_TIMEOUT_MS and we redirect with no visible loading screen
  // at all. If it's cold, this will time out and we start showing the
  // loading screen + polling until the app responds.
  pollUntilWarm();
})();
</script>
</body>
</html>
